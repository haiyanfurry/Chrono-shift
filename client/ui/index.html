<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval'; img-src 'self' data: https:; connect-src 'self' ws: wss: http: https:;">
    <title>Chrono-shift — QQ 风格社交平台</title>
    
    <!-- 全局样式 -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/login.css">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/chat.css">
    <link rel="stylesheet" href="css/community.css">
    
    <!-- 默认纯白主题 -->
    <link rel="stylesheet" href="css/themes/default.css" id="theme-stylesheet">
    
    <!-- 应用入口 -->
    <script src="js/utils.js" defer></script>
    <script src="js/ipc.js" defer></script>
    <script src="js/api.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/oauth.js" defer></script>
    <script src="js/theme_engine.js" defer></script>
    <script src="js/chat.js" defer></script>
    <script src="js/contacts.js" defer></script>
    <script src="js/community.js" defer></script>
    <script src="js/app.js" defer></script>
</head>
<body>
    <div id="app-container">
        <!-- 登录/注册页面 -->
        <div id="page-auth" class="page active">
            <!-- 装饰浮动元素 -->
            <div class="auth-deco-1"></div>
            <div class="auth-deco-2"></div>
            
            <div class="auth-container">
                <div class="auth-box">
                    <div class="auth-logo">
                        <div class="logo-icon">🎋</div>
                        <h1>墨竹</h1>
                        <p class="auth-subtitle">二次元社交平台</p>
                    </div>
                    
                    <!-- 登录表单 -->
                    <form id="form-login" class="auth-form active">
                        <div class="form-group">
                            <input type="text" id="login-username" placeholder="用户名" required>
                        </div>
                        <div class="form-group">
                            <input type="password" id="login-password" placeholder="密码" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-full">登录</button>
                        <p class="auth-switch">
                            还没有账号？<a href="#" onclick="showRegister()">立即注册</a>
                        </p>
                        <!-- OAuth 第三方登录 -->
                        <div class="oauth-divider">
                            <span>其他登录方式</span>
                        </div>
                        <div class="oauth-buttons">
                            <button type="button" class="btn-oauth btn-oauth-qq" onclick="Auth.qqLogin()">
                                <span class="oauth-icon">🐧</span>
                                <span>QQ 登录</span>
                            </button>
                            <button type="button" class="btn-oauth btn-oauth-wechat" onclick="Auth.wechatLogin()">
                                <span class="oauth-icon">💚</span>
                                <span>微信登录</span>
                            </button>
                        </div>
                    </form>
                    
                    <!-- 注册表单 -->
                    <form id="form-register" class="auth-form">
                        <div class="form-group">
                            <input type="text" id="reg-username" placeholder="用户名" required>
                        </div>
                        <div class="form-group">
                            <input type="text" id="reg-nickname" placeholder="昵称" required>
                        </div>
                        <div class="form-group">
                            <input type="password" id="reg-password" placeholder="密码" required>
                        </div>
                        <div class="form-group">
                            <input type="password" id="reg-confirm" placeholder="确认密码" required>
                        </div>
                        <button type="submit" class="btn btn-primary btn-full">注册</button>
                        <p class="auth-switch">
                            已有账号？<a href="#" onclick="showLogin()">立即登录</a>
                        </p>
                        <!-- 邮箱注册区 -->
                        <div class="email-register">
                            <div class="oauth-divider">
                                <span>邮箱注册</span>
                            </div>
                            <div class="form-group">
                                <input type="email" id="reg-email" placeholder="邮箱地址" autocomplete="email">
                            </div>
                            <div class="form-group-with-btn">
                                <input type="text" id="reg-email-code" placeholder="验证码" autocomplete="off">
                                <button type="button" class="btn btn-sm" id="btn-send-code" onclick="Auth.sendEmailCode()">发送验证码</button>
                            </div>
                            <div class="form-group">
                                <input type="password" id="reg-email-password" placeholder="设置密码（至少 6 位）" autocomplete="new-password">
                            </div>
                            <button type="button" class="btn btn-primary btn-full" onclick="Auth.emailRegister()">邮箱注册</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        
        <!-- 主界面 -->
        <div id="page-main" class="page">
            <!-- 左侧面板 -->
            <div class="sidebar">
                <div class="sidebar-header">
                    <div class="user-avatar" id="current-user-avatar">
                        <img src="assets/images/default_avatar.png" alt="头像">
                        <span class="status-dot"></span>
                    </div>
                    <span class="user-name" id="current-user-name">用户</span>
                    <button class="btn-icon" onclick="showSettings()" title="设置">⚙</button>
                </div>
                
                <!-- 搜索栏 -->
                <div class="search-bar">
                    <input type="text" id="search-input" placeholder="搜索用户..." oninput="onSearchInput(this.value)">
                </div>
                
                <!-- 联系人列表 -->
                <div class="contact-list" id="contact-list">
                    <!-- 动态由 JS 生成 -->
                </div>

                <!-- 外部网站跳转入口 -->
                <div class="external-links">
                    <div class="external-links-label">外部链接</div>
                    <div class="external-links-list">
                        <a class="external-link-item" href="#" onclick="openExternalUrl('bilibili')">
                            <span class="link-icon">📺</span>
                            <span class="link-name">Bilibili</span>
                            <span class="link-arrow">→</span>
                        </a>
                        <a class="external-link-item" href="#" onclick="openExternalUrl('acfun')">
                            <span class="link-icon">📡</span>
                            <span class="link-name">AcFun</span>
                            <span class="link-arrow">→</span>
                        </a>
                        <a class="external-link-item" href="#" onclick="openExternalUrl('comic-expo')">
                            <span class="link-icon">🎪</span>
                            <span class="link-name">漫展官网</span>
                            <span class="link-arrow">→</span>
                        </a>
                    </div>
                </div>
                
                <!-- 底部导航 -->
                <div class="sidebar-footer">
                    <button class="btn-nav active" onclick="switchTab('chat')" id="tab-chat">
                        <span class="nav-icon">💬</span>
                        <span class="nav-label">消息</span>
                    </button>
                    <button class="btn-nav" onclick="switchTab('contacts')" id="tab-contacts">
                        <span class="nav-icon">👥</span>
                        <span class="nav-label">联系人</span>
                    </button>
                    <button class="btn-nav" onclick="switchTab('community')" id="tab-community">
                        <span class="nav-icon">🎨</span>
                        <span class="nav-label">社区</span>
                    </button>
                </div>
            </div>
            
            <!-- 右侧内容区 -->
            <div class="main-content">
                <!-- 聊天区域 -->
                <div id="view-chat" class="content-view active">
                    <div class="chat-header" id="chat-header">
                        <span class="chat-partner">选择一个联系人开始聊天</span>
                    </div>
                    <div class="chat-messages" id="chat-messages">
                        <div class="no-chat-selected">
                            <div class="no-chat-icon">💬</div>
                            <p>选择一个好友开始对话</p>
                        </div>
                    </div>
                    <div class="chat-input-area">
                        <textarea id="chat-input" placeholder="输入消息..." 
                                  onkeydown="onChatKeydown(event)" disabled></textarea>
                        <button class="btn btn-primary" id="btn-send" onclick="sendMessage()" disabled>
                            发送
                        </button>
                    </div>
                </div>
                
                <!-- 联系人视图 -->
                <div id="view-contacts" class="content-view">
                    <div class="contacts-header">
                        <h2>联系人</h2>
                        <button class="btn btn-small btn-primary" onclick="showAddFriend()">+ 添加好友</button>
                    </div>
                    <div class="contacts-grid" id="contacts-grid">
                        <!-- 动态由 JS 生成 -->
                    </div>
                </div>
                
                <!-- 社区视图 -->
                <div id="view-community" class="content-view">
                    <div class="community-header">
                        <h2>社区模板</h2>
                        <button class="btn btn-small btn-primary" onclick="showUploadTemplate()">+ 上传模板</button>
                    </div>
                    <div class="template-grid" id="template-grid">
                        <!-- 动态由 JS 生成 -->
                    </div>
                </div>
                
                <!-- 设置视图 -->
                <div id="view-settings" class="content-view">
                    <div class="settings-header">
                        <h2>设置</h2>
                    </div>
                    <div class="settings-content">
                        <div class="settings-section">
                            <h3>📋 个人资料</h3>
                            <div class="form-group">
                                <label>昵称</label>
                                <input type="text" id="settings-nickname">
                            </div>
                            <button class="btn btn-primary" onclick="updateProfile()">保存</button>
                        </div>
                        <div class="settings-section">
                            <h3>🎨 主题</h3>
                            <p>当前主题: <span id="current-theme-name">纯白默认</span></p>
                            <button class="btn btn-secondary" onclick="resetTheme()">恢复默认主题</button>
                        </div>
                        <div class="settings-section">
                            <h3>ℹ️ 关于</h3>
                            <p>Chrono-shift v0.1.0 — 墨竹</p>
                            <button class="btn btn-secondary" onclick="logout()">退出登录</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>

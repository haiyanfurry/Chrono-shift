<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>授权回调 — Chrono-shift</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: #f5f7fa;
            color: #333;
        }
        .container {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #e0e0e0;
            border-top-color: #12B7F5;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        p { margin: 0; font-size: 14px; color: #666; }
    </style>
</head>
<body>
    <div class="container">
        <div class="spinner"></div>
        <p>登录成功，正在返回应用...</p>
    </div>
    <script>
        (function() {
            // 从 URL 查询参数提取 code 和 state
            var params = new URLSearchParams(window.location.search);
            var code = params.get('code');
            var state = params.get('state');

            // 从路径中判断 provider (QQ/WeChat)
            var path = window.location.pathname;
            var provider = 'qq';
            if (path.indexOf('wechat') !== -1) provider = 'wechat';

            if (window.opener && code) {
                // 向主窗口发送授权码
                window.opener.postMessage({
                    code: code,
                    state: state,
                    provider: provider
                }, '*');

                // 短暂延迟后自动关闭弹窗
                setTimeout(function() {
                    window.close();
                }, 800);
            } else if (code) {
                document.querySelector('.container').innerHTML = '<p>授权成功，请返回应用继续操作</p>';
            } else {
                document.querySelector('.container').innerHTML = '<p>授权失败：缺少参数</p>';
            }
        })();
    </script>
</body>
</html>
